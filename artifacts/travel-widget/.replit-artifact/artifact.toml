kind = "web"
previewPath = "/"
title = "Travel Companion"
version = "1.0.0"
id = "artifacts/travel-widget"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22668

[services.development]
run = "pnpm --filter @workspace/travel-widget run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travel-widget", "run", "build" ]
publicDir = "artifacts/travel-widget/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22668"
BASE_PATH = "/"
