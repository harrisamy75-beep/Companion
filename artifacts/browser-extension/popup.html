<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripProfile</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { width: 300px; font-family: system-ui, -apple-system, sans-serif; font-size: 13px; color: #1C1C1C; background: #FAFAF8; }

      header { background: #6B2737; color: #fff; padding: 14px 16px 11px; }
      header h1 { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 400; font-size: 18px; }
      header p { font-size: 11px; opacity: 0.85; margin-top: 2px; }

      .section { padding: 12px 16px; border-bottom: 1px solid #E5E0D8; background: #fff; }
      .section:last-of-type { border-bottom: none; }

      .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.16em; color: #A07840; margin-bottom: 5px; }
      .value { font-size: 14px; font-weight: 600; color: #1C1C1C; }
      .sub { font-size: 12px; color: #5C5248; margin-top: 2px; }

      .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
      .tag { background: #F5F0E6; color: #6B2737; border: 1px solid #E5E0D8; padding: 2px 7px; font-size: 11px; font-weight: 500; }
      .tag.empty { background: #FAFAF8; color: #94A39B; border-color: #E5E0D8; font-style: italic; }

      .sync-time { font-size: 11px; color: #94A39B; padding: 8px 16px 4px; font-style: italic; background: #fff; }

      .actions { padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 8px; background: #fff; }

      button, a.btn {
        display: block; width: 100%; padding: 10px 12px;
        font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
        cursor: pointer; text-align: center; text-decoration: none; border: none;
        transition: background 0.15s;
      }
      button.primary, button#resync, button#save-settings { background: #6B2737; color: #fff; }
      button.primary:hover, button#resync:hover, button#save-settings:hover { background: #5A1F2D; }
      button.primary:disabled, button#resync:disabled { background: #B89098; cursor: not-allowed; }

      a.btn, button.secondary { background: #F5F0E6; color: #1C1C1C; border: 1px solid #E5E0D8; }
      a.btn:hover, button.secondary:hover { background: #ECE4D4; }

      #status { font-size: 11px; color: #2D6A4F; text-align: center; min-height: 16px; font-style: italic; }
      #status.error { color: #6B2737; }

      .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
      .field label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: #A07840; }
      .field input {
        background: #FAFAF8; border: 1px solid #E5E0D8; padding: 8px 10px;
        font-size: 13px; color: #1C1C1C; font-family: inherit;
      }
      .field input:focus { outline: none; border-color: #A07840; }
      .field .hint { font-size: 11px; color: #5C5248; font-style: italic; }

      .setup-banner {
        background: #F5F0E6; border-left: 3px solid #A07840;
        padding: 10px 14px; margin: 12px 16px;
        font-size: 12px; color: #5C5248; font-style: italic;
      }

      .hidden { display: none !important; }

      .toggle-link {
        display: block; text-align: center; padding: 8px;
        font-size: 11px; color: #6B2737; text-decoration: none;
        background: #fff; border-top: 1px solid #E5E0D8;
        cursor: pointer; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      }
      .toggle-link:hover { background: #FAFAF8; }
    </style>
  </head>
  <body>
    <header>
      <h1>Companion</h1>
      <p>Your family travel profile, everywhere.</p>
    </header>

    <!-- ========== SETUP / SETTINGS VIEW ========== -->
    <div id="settings-view" class="hidden">
      <div class="setup-banner" id="setup-banner">
        Welcome — let's connect this extension to your Companion account.
      </div>

      <div class="section">
        <div class="field">
          <label for="cfg-userid">Your name (lowercase, no spaces)</label>
          <input type="text" id="cfg-userid" placeholder="e.g. amy-harris" autocomplete="off" />
          <span class="hint">The same name you used to log into Companion.</span>
        </div>

        <div class="field">
          <label for="cfg-api">App URL</label>
          <input type="text" id="cfg-api" placeholder="https://travelcompaniontool.replit.app" autocomplete="off" />
          <span class="hint">Where your Companion app is hosted.</span>
        </div>
      </div>

      <div class="actions">
        <button id="save-settings" class="primary">Save & sync</button>
        <button id="back-to-profile" class="secondary hidden">Back</button>
      </div>
    </div>

    <!-- ========== PROFILE VIEW ========== -->
    <div id="profile-view">
      <div class="section">
        <div class="label">Travelers</div>
        <div class="value" id="traveler-count">—</div>
        <div class="sub" id="children-detail"></div>
      </div>

      <div class="section">
        <div class="label">Travel style</div>
        <div class="tags" id="style-tags">
          <span class="tag empty">Not set</span>
        </div>
      </div>

      <div class="section">
        <div class="label">Auto-fill preview</div>
        <div class="sub" id="autofill-preview">—</div>
      </div>

      <div class="sync-time" id="sync-time"></div>

      <div class="actions">
        <div id="status"></div>
        <button id="resync" class="primary">Re-sync profile</button>
        <a class="btn" id="dashboard-link" href="#" target="_blank">
          Open dashboard
        </a>
      </div>

      <a class="toggle-link" id="open-settings">Settings</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
