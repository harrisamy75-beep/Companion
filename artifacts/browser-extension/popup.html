<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripProfile</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 280px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #1e293b;
        background: #fff;
      }

      header {
        background: #1a56db;
        color: #fff;
        padding: 14px 16px 10px;
      }

      header h1 {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.3px;
      }

      header p {
        font-size: 11px;
        opacity: 0.8;
        margin-top: 2px;
      }

      .section {
        padding: 12px 16px;
        border-bottom: 1px solid #f1f5f9;
      }

      .section:last-of-type {
        border-bottom: none;
      }

      .label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: #94a3b8;
        margin-bottom: 4px;
      }

      .value {
        font-size: 14px;
        font-weight: 600;
        color: #0f172a;
      }

      .sub {
        font-size: 12px;
        color: #64748b;
        margin-top: 2px;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 4px;
      }

      .tag {
        background: #eff6ff;
        color: #1d4ed8;
        border: 1px solid #bfdbfe;
        border-radius: 4px;
        padding: 2px 7px;
        font-size: 11px;
        font-weight: 500;
      }

      .tag.empty {
        background: #f8fafc;
        color: #94a3b8;
        border-color: #e2e8f0;
      }

      .sync-time {
        font-size: 11px;
        color: #94a3b8;
        padding: 8px 16px 4px;
      }

      .actions {
        padding: 10px 16px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      button,
      a.btn {
        display: block;
        width: 100%;
        padding: 9px 12px;
        border-radius: 7px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        border: none;
        transition: background 0.15s;
      }

      button#resync {
        background: #1a56db;
        color: #fff;
      }

      button#resync:hover {
        background: #1e40af;
      }

      button#resync:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }

      a.btn {
        background: #f1f5f9;
        color: #1e293b;
      }

      a.btn:hover {
        background: #e2e8f0;
      }

      #status {
        font-size: 11px;
        color: #16a34a;
        text-align: center;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>TripProfile</h1>
      <p>Your family travel companion</p>
    </header>

    <div class="section">
      <div class="label">Travelers</div>
      <div class="value" id="traveler-count">—</div>
      <div class="sub" id="children-detail"></div>
    </div>

    <div class="section">
      <div class="label">Travel style</div>
      <div class="tags" id="style-tags">
        <span class="tag empty">Not set</span>
      </div>
    </div>

    <div class="section">
      <div class="label">Auto-fill preview</div>
      <div class="sub" id="autofill-preview">—</div>
    </div>

    <div class="sync-time" id="sync-time"></div>

    <div class="actions">
      <div id="status"></div>
      <button id="resync">Re-sync profile</button>
      <a class="btn" id="dashboard-link" href="#" target="_blank">
        Open dashboard →
      </a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
