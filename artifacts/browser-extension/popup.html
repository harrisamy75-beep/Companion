<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Companion</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { width: 320px; font-family: system-ui, -apple-system, sans-serif; font-size: 13px; color: #1C1C1C; background: #FAFAF8; }

      header { background: #6B2737; color: #fff; padding: 14px 16px 11px; }
      header h1 { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 400; font-size: 18px; }
      header p { font-size: 11px; opacity: 0.85; margin-top: 2px; }

      .section { padding: 12px 16px; border-bottom: 1px solid #E5E0D8; background: #fff; }
      .section:last-of-type { border-bottom: none; }

      .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.16em; color: #A07840; margin-bottom: 5px; }
      .value { font-size: 14px; font-weight: 600; color: #1C1C1C; }
      .sub { font-size: 12px; color: #5C5248; margin-top: 2px; }
      .help { font-size: 11px; color: #94A39B; font-style: italic; margin-top: 6px; line-height: 1.4; }

      .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
      .tag.empty { background: #FAFAF8; color: #94A39B; border: 1px solid #E5E0D8; padding: 2px 7px; font-size: 11px; font-style: italic; }

      .sync-time { font-size: 11px; color: #94A39B; padding: 8px 16px 4px; font-style: italic; background: #fff; }

      .actions { padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 8px; background: #fff; }

      button, a.btn {
        display: block; width: 100%; padding: 10px 12px;
        font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
        cursor: pointer; text-align: center; text-decoration: none; border: none;
        transition: background 0.15s;
      }
      button.primary, button#resync, button#fill-page, button#save-key { background: #6B2737; color: #fff; }
      button.primary:hover, button#resync:hover, button#fill-page:hover, button#save-key:hover { background: #5A1F2D; }
      button.primary:disabled, button#resync:disabled, button#fill-page:disabled, button#save-key:disabled { background: #B89098; cursor: not-allowed; }

      a.btn { background: #F5F0E6; color: #1C1C1C; border: 1px solid #E5E0D8; }
      a.btn:hover { background: #ECE4D4; }

      #status, #key-status { font-size: 11px; color: #2D6A4F; text-align: center; min-height: 16px; font-style: italic; }
      #status.error, #key-status.error { color: #6B2737; }

      input.key-input {
        width: 100%;
        padding: 9px 10px;
        font-size: 12px;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        border: 1px solid #E5E0D8;
        background: #FAFAF8;
        color: #1C1C1C;
      }
      input.key-input:focus { border-color: #6B2737; outline: none; }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <header>
      <h1>Companion</h1>
      <p>Your family travel profile, everywhere.</p>
    </header>

    <!-- ========== CONNECT FLOW (no key yet OR auth failed) ========== -->
    <div class="section" id="connect-section">
      <div class="label">Connect</div>
      <div class="sub" id="connect-status">Not connected</div>
      <div class="actions" style="padding: 12px 0 0;">
        <button id="open-settings" class="primary">Get my API key</button>
        <input
          id="key-input"
          class="key-input"
          type="text"
          placeholder="cpn_..."
          autocomplete="off"
          spellcheck="false"
        />
        <div class="help">Get your key from Companion Settings, then paste it here.</div>
        <button id="save-key" class="primary">Save &amp; Sync</button>
        <div id="key-status"></div>
        <button id="clear-key" class="primary hidden" style="background: #94A39B;">Disconnect</button>
      </div>
    </div>

    <!-- ========== PROFILE VIEW ========== -->
    <div id="profile-view">
      <div class="section">
        <div class="label">Travelers</div>
        <div class="value" id="traveler-count">—</div>
        <div class="sub" id="children-detail"></div>
      </div>

      <div class="section">
        <div class="label">Travel style</div>
        <div class="tags" id="style-tags">
          <span class="tag empty">Not set</span>
        </div>
      </div>

      <div class="section">
        <div class="label">Auto-fill preview</div>
        <div class="sub" id="autofill-preview">—</div>
      </div>

      <div class="sync-time" id="sync-time"></div>

      <div class="actions">
        <div id="status"></div>
        <button id="resync" class="primary">Re-sync profile</button>
        <button id="fill-page" class="primary" style="font-family: 'Raleway', system-ui, sans-serif; font-weight: 600;">Fill this page</button>
        <a class="btn" id="dashboard-link" href="https://travelcompaniontool.replit.app/" target="_blank">
          Open dashboard
        </a>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
